<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日祝福</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <!-- 动态渐变背景 -->
    <div class="gradient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- 漂浮粒子效果 -->
    <div class="particles" id="particles"></div>

    <!-- 登录卡片 -->
    <div class="login-card">
        <div class="card-glow"></div>

        <!-- 顶部装饰 -->
        <div class="card-header">
            <div class="birthday-icon">
                <span class="cake">🎂</span>
            </div>
            <h1 class="title">生日祝福</h1>
            <p class="subtitle">祝你生日快乐，天天开心！</p>
        </div>

        <!-- 表单 -->
        <div class="login-form">
            <div class="input-group">
                <label class="input-label">生日寿星</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" placeholder="请输入你的名字" required>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">启动密钥</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="password" placeholder="你的生日密码" required>
                </div>
            </div>

            <button id="login-btn" class="login-btn">
                <span class="btn-text">进入生日Party</span>
                <span class="btn-icon">🎉</span>
                <div class="btn-shine"></div>
            </button>

            <p id="error-message" class="error-message"></p>
        </div>

        <!-- 底部装饰 -->
        <div class="card-footer">
            <span class="footer-text">✨ 愿你的每一天都闪闪发光 ✨</span>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
